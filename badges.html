<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badges</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    /* Default: match GitHub light theme */
    background: #ffffff;
    transition: background 0.3s ease;
  }

  /* GitHub dark theme */
  @media (prefers-color-scheme: dark) {
    body { background: #0d1117; }
  }

  .badge-row {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    justify-content: center;
    align-items: center;
    padding: 16px;
  }

  .badge-3d {
    position: relative;
    border-radius: 999px;
    overflow: hidden;
    line-height: 0;
    box-shadow:
      0 16px 48px rgba(0,0,0,0.50),
      0 8px 20px rgba(0,0,0,0.40),
      0 3px 6px rgba(0,0,0,0.35),
      inset 0 3px 5px rgba(0,0,0,0.55),
      inset 0 6px 10px rgba(0,0,0,0.20),
      inset 0 -2px 3px rgba(255,255,255,0.07),
      inset 0 -1px 1px rgba(255,255,255,0.12),
      0 0 0 1px rgba(255,255,255,0.05);
    transform: perspective(500px) rotateX(3deg) translateY(2px);
    transition: transform 0.4s cubic-bezier(.175,.885,.32,1.275),
                box-shadow 0.4s cubic-bezier(.175,.885,.32,1.275);
    cursor: default;
  }

  /* Glossy highlight */
  .badge-3d::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 999px;
    background: linear-gradient(
      175deg,
      rgba(255,255,255,0.28) 0%,
      rgba(255,255,255,0.12) 15%,
      rgba(255,255,255,0.04) 35%,
      transparent 48%,
      rgba(0,0,0,0.04) 70%,
      rgba(0,0,0,0.12) 85%,
      rgba(0,0,0,0.20) 100%
    );
    pointer-events: none;
    z-index: 2;
  }

  /* Specular streak */
  .badge-3d::after {
    content: '';
    position: absolute;
    top: 4px;
    left: 16%;
    width: 42%;
    height: 5px;
    border-radius: 999px;
    background: linear-gradient(
      90deg,
      transparent 0%,
      rgba(255,255,255,0.15) 15%,
      rgba(255,255,255,0.40) 45%,
      rgba(255,255,255,0.50) 50%,
      rgba(255,255,255,0.40) 55%,
      rgba(255,255,255,0.15) 85%,
      transparent 100%
    );
    filter: blur(1.8px);
    pointer-events: none;
    z-index: 3;
  }

  .badge-3d img {
    display: block;
    width: 100%;
    height: auto;
    border-radius: 999px;
    position: relative;
    z-index: 1;
    filter: brightness(1.08) contrast(1.02);
  }

  /* Hover */
  .badge-3d:hover {
    transform: perspective(500px) rotateX(0deg) translateY(-6px) scale(1.06);
  }

  /* ── Per-badge color shadows ── */
  .badge-3d.t-green  { box-shadow: 0 16px 48px rgba(168,213,194,0.12), 0 8px 20px rgba(0,0,0,0.40), 0 3px 6px rgba(0,0,0,0.35), inset 0 3px 5px rgba(0,0,0,0.55), inset 0 6px 10px rgba(0,0,0,0.20), inset 0 -2px 3px rgba(255,255,255,0.07), inset 0 -1px 1px rgba(255,255,255,0.12), 0 0 0 1px rgba(168,213,194,0.08); }
  .badge-3d.t-blue   { box-shadow: 0 16px 48px rgba(183,201,226,0.10), 0 8px 20px rgba(0,0,0,0.40), 0 3px 6px rgba(0,0,0,0.35), inset 0 3px 5px rgba(0,0,0,0.55), inset 0 6px 10px rgba(0,0,0,0.20), inset 0 -2px 3px rgba(255,255,255,0.07), inset 0 -1px 1px rgba(255,255,255,0.12), 0 0 0 1px rgba(183,201,226,0.08); }
  .badge-3d.t-cyan   { box-shadow: 0 16px 48px rgba(176,196,217,0.10), 0 8px 20px rgba(0,0,0,0.40), 0 3px 6px rgba(0,0,0,0.35), inset 0 3px 5px rgba(0,0,0,0.55), inset 0 6px 10px rgba(0,0,0,0.20), inset 0 -2px 3px rgba(255,255,255,0.07), inset 0 -1px 1px rgba(255,255,255,0.12), 0 0 0 1px rgba(176,196,217,0.08); }
  .badge-3d.t-indigo { box-shadow: 0 16px 48px rgba(195,212,230,0.10), 0 8px 20px rgba(0,0,0,0.40), 0 3px 6px rgba(0,0,0,0.35), inset 0 3px 5px rgba(0,0,0,0.55), inset 0 6px 10px rgba(0,0,0,0.20), inset 0 -2px 3px rgba(255,255,255,0.07), inset 0 -1px 1px rgba(255,255,255,0.12), 0 0 0 1px rgba(195,212,230,0.08); }
  .badge-3d.t-purple { box-shadow: 0 16px 48px rgba(214,194,232,0.12), 0 8px 20px rgba(0,0,0,0.40), 0 3px 6px rgba(0,0,0,0.35), inset 0 3px 5px rgba(0,0,0,0.55), inset 0 6px 10px rgba(0,0,0,0.20), inset 0 -2px 3px rgba(255,255,255,0.07), inset 0 -1px 1px rgba(255,255,255,0.12), 0 0 0 1px rgba(214,194,232,0.08); }
  .badge-3d.t-pink   { box-shadow: 0 16px 48px rgba(175,196,214,0.10), 0 8px 20px rgba(0,0,0,0.40), 0 3px 6px rgba(0,0,0,0.35), inset 0 3px 5px rgba(0,0,0,0.55), inset 0 6px 10px rgba(0,0,0,0.20), inset 0 -2px 3px rgba(255,255,255,0.07), inset 0 -1px 1px rgba(255,255,255,0.12), 0 0 0 1px rgba(175,196,214,0.08); }

  .badge-3d.t-green:hover  { box-shadow: 0 24px 64px rgba(168,213,194,0.18), 0 12px 28px rgba(0,0,0,0.35), 0 4px 10px rgba(0,0,0,0.30), inset 0 3px 5px rgba(0,0,0,0.50), inset 0 6px 10px rgba(0,0,0,0.15), inset 0 -2px 3px rgba(255,255,255,0.10), inset 0 -1px 1px rgba(255,255,255,0.15), 0 0 0 1px rgba(168,213,194,0.12), 0 0 40px rgba(168,213,194,0.06); }
  .badge-3d.t-blue:hover   { box-shadow: 0 24px 64px rgba(183,201,226,0.16), 0 12px 28px rgba(0,0,0,0.35), 0 4px 10px rgba(0,0,0,0.30), inset 0 3px 5px rgba(0,0,0,0.50), inset 0 6px 10px rgba(0,0,0,0.15), inset 0 -2px 3px rgba(255,255,255,0.10), inset 0 -1px 1px rgba(255,255,255,0.15), 0 0 0 1px rgba(183,201,226,0.12), 0 0 40px rgba(183,201,226,0.06); }
  .badge-3d.t-cyan:hover   { box-shadow: 0 24px 64px rgba(176,196,217,0.16), 0 12px 28px rgba(0,0,0,0.35), 0 4px 10px rgba(0,0,0,0.30), inset 0 3px 5px rgba(0,0,0,0.50), inset 0 6px 10px rgba(0,0,0,0.15), inset 0 -2px 3px rgba(255,255,255,0.10), inset 0 -1px 1px rgba(255,255,255,0.15), 0 0 0 1px rgba(176,196,217,0.12), 0 0 40px rgba(176,196,217,0.06); }
  .badge-3d.t-indigo:hover { box-shadow: 0 24px 64px rgba(195,212,230,0.16), 0 12px 28px rgba(0,0,0,0.35), 0 4px 10px rgba(0,0,0,0.30), inset 0 3px 5px rgba(0,0,0,0.50), inset 0 6px 10px rgba(0,0,0,0.15), inset 0 -2px 3px rgba(255,255,255,0.10), inset 0 -1px 1px rgba(255,255,255,0.15), 0 0 0 1px rgba(195,212,230,0.12), 0 0 40px rgba(195,212,230,0.06); }
  .badge-3d.t-purple:hover { box-shadow: 0 24px 64px rgba(214,194,232,0.20), 0 12px 28px rgba(0,0,0,0.35), 0 4px 10px rgba(0,0,0,0.30), inset 0 3px 5px rgba(0,0,0,0.50), inset 0 6px 10px rgba(0,0,0,0.15), inset 0 -2px 3px rgba(255,255,255,0.10), inset 0 -1px 1px rgba(255,255,255,0.15), 0 0 0 1px rgba(214,194,232,0.12), 0 0 40px rgba(214,194,232,0.08); }
  .badge-3d.t-pink:hover   { box-shadow: 0 24px 64px rgba(175,196,214,0.16), 0 12px 28px rgba(0,0,0,0.35), 0 4px 10px rgba(0,0,0,0.30), inset 0 3px 5px rgba(0,0,0,0.50), inset 0 6px 10px rgba(0,0,0,0.15), inset 0 -2px 3px rgba(255,255,255,0.10), inset 0 -1px 1px rgba(255,255,255,0.15), 0 0 0 1px rgba(175,196,214,0.12), 0 0 40px rgba(175,196,214,0.06); }

  /* Drop-in animation */
  @keyframes badgeDrop {
    0%   { opacity: 0; transform: perspective(500px) rotateX(15deg) translateY(40px) scale(0.85); filter: blur(6px); }
    60%  { opacity: 1; filter: blur(0px); }
    80%  { transform: perspective(500px) rotateX(-1deg) translateY(-4px) scale(1.02); }
    100% { opacity: 1; transform: perspective(500px) rotateX(3deg) translateY(2px) scale(1); filter: blur(0px); }
  }
  .badge-3d { opacity: 0; animation: badgeDrop 0.8s cubic-bezier(.175,.885,.32,1.275) forwards; }
  .badge-3d:nth-child(1) { animation-delay: 0.05s; }
  .badge-3d:nth-child(2) { animation-delay: 0.15s; }
  .badge-3d:nth-child(3) { animation-delay: 0.25s; }
  .badge-3d:nth-child(4) { animation-delay: 0.35s; }
  .badge-3d:nth-child(5) { animation-delay: 0.45s; }
  .badge-3d:nth-child(6) { animation-delay: 0.55s; }
</style>
</head>
<body>
<div class="badge-row">
  <div class="badge-3d t-green">
    <img src="https://img.shields.io/badge/SIMPLE-Game_Engine-A8D5C2?style=for-the-badge&labelColor=1A1A1A" alt="SIMPLE Game Engine">
  </div>
  <div class="badge-3d t-blue">
    <img src="https://img.shields.io/badge/Languages-Python_%26_C%2B%2B-B7C9E2?style=for-the-badge&logo=python&logoColor=F2D16B&labelColor=1A1A1A" alt="Languages">
  </div>
  <div class="badge-3d t-cyan">
    <img src="https://img.shields.io/badge/BUILD_SYSTEM-CMake-B0C4D9?style=for-the-badge&logo=cmake&logoColor=white&labelColor=1A1A1A" alt="CMake">
  </div>
  <div class="badge-3d t-indigo">
    <img src="https://img.shields.io/badge/RENDERING-OpenGL_3.3-C3D4E6?style=for-the-badge&logo=opengl&logoColor=white&labelColor=1A1A1A" alt="OpenGL 3.3">
  </div>
  <div class="badge-3d t-purple">
    <img src="https://img.shields.io/badge/FEATURE-Visual_Editor-D6C2E8?style=for-the-badge&labelColor=1A1A1A" alt="Visual Editor">
  </div>
  <div class="badge-3d t-pink">
    <img src="https://img.shields.io/badge/pip_install-simple--game--engine-AFC4D6?style=for-the-badge&logo=pypi&logoColor=F2D16B&labelColor=1A1A1A" alt="pip install">
  </div>
</div>
</body>
</html>
