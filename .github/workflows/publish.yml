name: publish

on:
  workflow_dispatch:
    inputs:
      version: 
        description: "1.1.1"
        required: true
      publish_to_pypi:
        description: "Publish to PyPI"
        type: boolean
        default: true

jobs:
  build:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set version dynamically
        run: |
          echo "Setting version to ${{ inputs.version }}"
          sed -i 's/version = ".*"/version = "${{ inputs.version }}"/' pyproject.toml || true

      - name: Clean build cache
        run: |
          rm -rf dist build *.egg-info _skbuild || true

      - name: Install build tools
        run: python -m pip install -U pip cibuildwheel build ninja

      - name: Build wheels
        run: python -m cibuildwheel --output-dir dist

      - name: Verify version (CRITICAL)
        run: |
          ls dist
          if ls dist | grep -q "0.1.1"; then
            echo "❌ ERROR: Old version detected"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: dist/*

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: ${{ inputs.publish_to_pypi }}

    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Final sanity check
        run: |
          ls dist
          if ls dist | grep -q "0.1.1"; then
            echo "❌ Refusing to upload old version"
            exit 1
          fi

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
