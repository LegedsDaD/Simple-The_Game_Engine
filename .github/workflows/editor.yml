name: editor

on:
  workflow_dispatch:
    inputs:
      update_editor_branch:
        description: "Update/push the `editor` branch with latest editor downloads"
        type: boolean
        required: false
        default: true

jobs:
  build_editor:
    name: Build editor (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Linux system deps (GLFW/OpenGL headers)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            mesa-common-dev libgl1-mesa-dev

      - name: Install build deps
        run: python -m pip install -U pip pyinstaller

      - name: Install engine (builds C++ extension)
        run: python -m pip install .

      - name: Build editor bundle (PyInstaller)
        run: python tools/build_editor.py

      - name: Package editor (Windows zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force editor_dist | Out-Null
          Compress-Archive -Path dist\SimpleEditor\* -DestinationPath editor_dist\SimpleEditor-windows.zip -Force

      - name: Package editor (macOS zip)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p editor_dist
          (cd dist && zip -r ../editor_dist/SimpleEditor-macos.zip SimpleEditor)

      - name: Package editor (Linux zip)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p editor_dist
          (cd dist && zip -r ../editor_dist/SimpleEditor-linux.zip SimpleEditor)

      - uses: actions/upload-artifact@v4
        with:
          name: editor-${{ matrix.os }}
          path: editor_dist/*.zip

  editor_branch:
    name: Update editor branch
    needs: build_editor
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.update_editor_branch == true || inputs.update_editor_branch == 'true') }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: editor_downloads
          merge-multiple: true

      - name: Build editor branch payload
        shell: bash
        run: |
          set -euo pipefail
          out="${RUNNER_TEMP}/simple_editor_branch_out"
          rm -rf "$out"
          mkdir -p "$out"

          # Copy zips produced by the build job (filenames are stable).
          cp -f editor_downloads/SimpleEditor-*.zip "$out/" 2>/dev/null || true

          cat > "$out/README.md" <<'EOF'
          # Simple Editor Downloads

          This branch contains the latest **standalone Simple Editor** downloads built by CI.

          - `SimpleEditor-windows.zip`
          - `SimpleEditor-macos.zip`
          - `SimpleEditor-linux.zip`

          Download the ZIP for your OS, extract it, and run the `SimpleEditor` executable.
          EOF

          echo "${GITHUB_RUN_ID}" > "$out/LATEST.txt"

          # Guardrail: if none of the zips exist, fail loudly (so we don't publish an empty branch).
          count="$(ls -1 "$out"/SimpleEditor-*.zip 2>/dev/null | wc -l | tr -d ' ')"
          if [ "$count" -lt 1 ]; then
            echo "ERROR: No editor zip artifacts found in editor_downloads/"
            echo "Contents:"
            ls -la editor_downloads || true
            exit 1
          fi

      - name: Commit to editor branch
        shell: bash
        run: |
          set -euo pipefail
          out="${RUNNER_TEMP}/simple_editor_branch_out"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch --no-tags --prune --depth=1 origin +refs/heads/editor:refs/remotes/origin/editor || true

          if git show-ref --verify --quiet refs/remotes/origin/editor; then
            git checkout -B editor origin/editor
          else
            git checkout --orphan editor
            git rm -rf . >/dev/null 2>&1 || true
          fi

          # Replace branch contents; keep `.git`, and copy from $RUNNER_TEMP (so we don't delete our source).
          find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
          cp -a "$out/." .

          git add -A
          git commit -m "Update editor downloads (run ${GITHUB_RUN_ID})" || echo "No changes to commit."
          git push -f origin editor

